name: Custom Tags Manager
description: Standalone hierarchical custom tags manager for editing and creating tags
version: 0.3.0
url: https://github.com/RollainKraus/stash-plugins

settings:
  c_treeExpansionBehavior:
    displayName: Tree Expansion Behavior
    type: STRING
    description: "expand_all, collapse_all, or remember (Default: remember)"

ui:
  javascript:
    - CustomTagsManager.js
  css:
    - CustomTagsManager.css
